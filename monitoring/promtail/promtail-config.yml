server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: edi-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: "service"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(edi-.*|api-gateway|sender|receiver|transformer|worker|simulator).*"
        action: keep
        target_label: "__address__"
      - replacement: "edi-simulator"
        target_label: "job"
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            service: service
      - labels:
          level:
          service:

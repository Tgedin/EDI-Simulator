global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: sender
    static_configs:
      - targets: ["sender:9091"]

  - job_name: receiver
    static_configs:
      - targets: ["receiver:9092"]

  - job_name: transformer
    static_configs:
      - targets: ["transformer:9093"]

  - job_name: simulator
    static_configs:
      - targets: ["simulator:9094"]

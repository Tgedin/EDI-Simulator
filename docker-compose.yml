version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: edi-postgres
    environment:
      POSTGRES_USER: edi_user
      POSTGRES_PASSWORD: edi_password
      POSTGRES_DB: edi_simulator
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edi_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: edi-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    container_name: edi-api-gateway
    ports:
      - "8080:8080"
    environment:
      API_GATEWAY_PORT: 8080
      API_GATEWAY_HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: edi_user
      DB_PASSWORD: edi_password
      DB_NAME: edi_simulator
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: edi.messages
      LOG_LEVEL: info
      ENVIRONMENT: development
      OTEL_ENDPOINT: jaeger:4318
      SIMULATOR_URL: http://simulator:9094
      LLM_SERVICE_URL: http://llm-service:9095
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  sender:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: sender
    container_name: edi-sender
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: edi_user
      DB_PASSWORD: edi_password
      DB_NAME: edi_simulator
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: edi.messages
      RABBITMQ_SENDER_QUEUE: messages
      RABBITMQ_RECEIVER_QUEUE: messages
      LOG_LEVEL: info
      ENVIRONMENT: development
      OTEL_ENDPOINT: jaeger:4318
      METRICS_PORT: ":9091"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  receiver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: receiver
    container_name: edi-receiver
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: edi_user
      DB_PASSWORD: edi_password
      DB_NAME: edi_simulator
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: edi.messages
      RABBITMQ_RECEIVER_QUEUE: messages
      RABBITMQ_TRANSFORM_QUEUE: transform
      LOG_LEVEL: info
      ENVIRONMENT: development
      OTEL_ENDPOINT: jaeger:4318
      METRICS_PORT: ":9092"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    container_name: edi-worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: edi_user
      DB_PASSWORD: edi_password
      DB_NAME: edi_simulator
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: edi.messages
      RABBITMQ_SENDER_QUEUE: messages
      LOG_LEVEL: info
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  transformer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: transformer
    container_name: edi-transformer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: edi_user
      DB_PASSWORD: edi_password
      DB_NAME: edi_simulator
      DB_SSL_MODE: disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: edi.messages
      RABBITMQ_TRANSFORM_QUEUE: transform
      RABBITMQ_SENDER_QUEUE: sender
      LOG_LEVEL: info
      ENVIRONMENT: development
      OTEL_ENDPOINT: jaeger:4318
      METRICS_PORT: ":9093"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edi-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws
    depends_on:
      - api-gateway
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Simulator ──────────────────────────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: simulator
    container_name: edi-simulator
    environment:
      SIMULATOR_ENABLED: "true"
      SIMULATOR_RATE: "10"
      SIMULATOR_ERROR_RATE: "0.15"
      SIMULATOR_API_URL: http://api-gateway:8080
      METRICS_PORT: ":9094"
      OTEL_ENDPOINT: jaeger:4318
      LOG_LEVEL: info
    depends_on:
      - api-gateway
    restart: unless-stopped

  # ── LLM stack ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: edi-ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/bin/ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  llm-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: llm-service
    container_name: edi-llm
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: edi_user
      DB_PASSWORD: edi_password
      DB_NAME: edi_simulator
      DB_SSL_MODE: disable
      OLLAMA_URL: http://ollama:11434
      LLM_SERVICE_PORT: "9095"
      PROMETHEUS_URL: http://prometheus:9090
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  # ── Observability stack ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: edi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.3
    container_name: edi-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.5
    container_name: edi-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.5
    container_name: edi-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: edi-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  ollama_data:
